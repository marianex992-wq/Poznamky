<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAZE MADNESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #fe2c55; --accent: #25F4EE; --gold: #FFD700; --bg: #05050a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; font-family: 'Montserrat', sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; position: fixed; width: 100%; height: 100%; color: #fff; }
        
        /* Animovanť pozadŪ s kostiŤkami */
        body::before {
            content: ''; position: absolute; inset: -100px;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            animation: grid 8s linear infinite; z-index: -1; opacity: 0.4;
        }
        @keyframes grid { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 25px; border-radius: 30px; text-align: center; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        h1 { font-size: 32px; margin: 0 0 5px; text-transform: uppercase; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 15px var(--p); }
        .sub { font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 20px; }

        input { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; background: rgba(0,0,0,0.4); color: #fff; text-align: center; font-weight: bold; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .diff-row { display: flex; gap: 8px; margin: 15px 0; }
        .diff-btn { flex: 1; padding: 12px 5px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 10px; font-weight: 900; transition: 0.2s; color: rgba(255,255,255,0.5); }
        .diff-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px #fff; }

        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-main { background: var(--p); color: #fff; box-shadow: 0 5px 15px rgba(254,44,85,0.3); }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-join { background: var(--accent); color: #000; }
        .btn:active { transform: scale(0.95); }

        .wallet { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: 900; z-index: 2000; }

        #game { display: none; width: 100%; height: 100%; position: relative; }
        #map { width: 100%; height: calc(100% - 160px); position: absolute; top: 0; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; z-index: 10; }

        #controls-wrapper { position: fixed; bottom: 0; width: 100%; height: 160px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 3000; border-top: 1px solid rgba(255,255,255,0.1); }
        #controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; }
        .arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
        .arrow:active { background: #fff; color: #000; }

        .player { position: absolute; width: 28px; height: 28px; border-radius: 8px; border: 3px solid #fff; transition: 0.05s linear; z-index: 500; }
        .obs { position: absolute; width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .goal { position: absolute; width: 60px; height: 60px; border: 4px dashed #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; animation: rot 4s linear infinite; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wallet">?? <span id="coin-val">0</span></div>

<div id="screen-start" class="screen">
    <div class="card">
        <h1>MAZE MADNESS</h1>
        <div class="sub">MULTIPLAYER CHALLENGE</div>
        
        <input id="nick" placeholder="TVOJE JM…NO" maxlength="10">
        
        <div class="diff-row">
            <button class="diff-btn active" id="d-easy" onclick="setDiff('easy', 10, 'd-easy')">EASY</button>
            <button class="diff-btn" id="d-hard" onclick="setDiff('hard', 15, 'd-hard')">HARD</button>
            <button class="diff-btn" id="d-extr" onclick="setDiff('extrem', 30, 'd-extr')">EXTREM</button>
        </div>
        
        <button class="btn btn-main" onclick="hostHru()">VYTVOōIT HRU</button>
        <button class="btn btn-sec" onclick="openShop()">OBCHOD SE SKINY</button>
        
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
        
        <input id="room-input" placeholder="K”D POKOJE">
        <button class="btn btn-join" onclick="pripojHru()">PōIPOJIT SE</button>
    </div>
</div>

<div id="screen-lobby" class="screen" style="display:none">
    <div class="card">
        <div class="sub">K”D TV… HRY</div>
        <div id="display-code" style="font-size:45px; font-weight:900; color:var(--accent); margin-bottom:15px;">----</div>
        <div id="lobby-list" style="text-align:left; background:rgba(0,0,0,0.2); border-radius:15px; padding:15px; margin-bottom:20px; font-size: 14px;"></div>
        <button id="start-btn" class="btn btn-main" style="display:none" onclick="odstartovat()">START HRY</button>
        <div id="wait-msg" style="font-size:11px; opacity:0.6;">»EKŃ SE NA HOSTITELE...</div>
    </div>
</div>

<div id="game">
    <div id="hud"><span id="biom-name" style="color:var(--accent)">MAPA</span> | LVL: <span id="lvl">1</span></div>
    <div id="map"></div>
    <div id="controls-wrapper">
        <div id="controls">
            <div></div><button class="arrow" onpointerdown="pohyb('u')">^</button><div></div>
            <button class="arrow" onpointerdown="pohyb('l')">č</button>
            <button class="arrow" onpointerdown="pohyb('d')">°</button>
            <button class="arrow" onpointerdown="pohyb('r')">õ</button>
        </div>
    </div>
</div>

<script>
// PŔVODNÕ FIREBASE LOGIKA (Nezmžnžna)
const firebaseConfig = { databaseURL: "https://mejdrixgame-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let mujId = "u" + Math.floor(Math.random() * 9999);
let mojeJmeno = "", mojeMisto = "", jeHost = false, aktualniLevel = 1, hotov = false;
let mojePos = { x: 30, y: 30 };
let obtiznost = "easy", maxLevelu = 10;
let coins = parseInt(localStorage.getItem('mm_coins')) || 0;
document.getElementById('coin-val').innerText = coins;

function setDiff(d, m, id) {
    obtiznost = d; maxLevelu = m;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function hostHru() {
    mojeJmeno = document.getElementById('nick').value || "HrŠŤ";
    mojeMisto = Math.floor(1000 + Math.random() * 8999).toString();
    jeHost = true;
    await db.ref('rooms/' + mojeMisto).set({ status: 'lobby', level: 1, mode: obtiznost, maxLvl: maxLevelu });
    vstoupitDoLobby();
}

async function pripojHru() {
    mojeJmeno = document.getElementById('nick').value || "HrŠŤ";
    mojeMisto = document.getElementById('room-input').value;
    if(!mojeMisto) return;
    const snap = await db.ref('rooms/' + mojeMisto).once('value');
    if(snap.exists()) {
        obtiznost = snap.val().mode; maxLevelu = snap.val().maxLvl;
        vstoupitDoLobby();
    }
}

function vstoupitDoLobby() {
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-lobby').style.display = 'flex';
    document.getElementById('display-code').innerText = mojeMisto;
    if(jeHost) document.getElementById('start-btn').style.display = 'block';

    db.ref('rooms/'+mojeMisto+'/players/'+mujId).set({ name: mojeJmeno, x: 30, y: 30, finish: false });
    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => {
        const list = document.getElementById('lobby-list'); list.innerHTML = "";
        snap.forEach(p => {
            let pd = p.val();
            list.innerHTML += `<div style="margin-bottom:5px;">ē ${pd.name} ${pd.finish?'(HOTOVO)':''}</div>`;
        });
    });

    db.ref('rooms/'+mojeMisto+'/status').on('value', snap => { if(snap.val() === 'go') spustitHru(); });
}

function odstartovat() { db.ref('rooms/'+mojeMisto).update({ status: 'go' }); }

function spustitHru() {
    document.getElementById('screen-lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    db.ref('rooms/'+mojeMisto+'/level').on('value', snap => { if(snap.val()){ aktualniLevel = snap.val(); generujMapu(); } });
    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => { vykresliHraci(snap.val()); });
    setInterval(() => { if(!hotov) db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({x:mojePos.x, y:mojePos.y}); }, 50);
}

function generujMapu() {
    hotov = false; document.getElementById('lvl').innerText = aktualniLevel;
    const map = document.getElementById('map'); map.innerHTML = ""; mojePos = { x: 25, y: 25 };
    const cols = Math.floor(window.innerWidth / 40);
    const rows = Math.floor((window.innerHeight - 160) / 40);
    
    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            if((r < 2 && c < 2) || (r > rows-3 && c > cols-3)) continue;
            if(Math.random() < 0.18) {
                let o = document.createElement('div'); o.className = 'obs';
                o.style.left = c*40+"px"; o.style.top = r*40+"px"; map.appendChild(o);
            }
        }
    }
    let g = document.createElement('div'); g.className = 'goal'; g.innerText = "CÕL";
    g.style.left = (cols-2)*40+"px"; g.style.top = (rows-2)*40+"px"; map.appendChild(g);
}

function pohyb(s) {
    if(hotov) return;
    let nx = mojePos.x, ny = mojePos.y;
    if(s=='u') ny -= 20; if(s=='d') ny += 20;
    if(s=='l') nx -= 20; if(s=='r') nx += 20;
    
    let hit = false;
    document.querySelectorAll('.obs').forEach(o => {
        let ox = parseInt(o.style.left), oy = parseInt(o.style.top);
        if(nx < ox+40 && nx+28 > ox && ny < oy+40 && ny+28 > oy) hit = true;
    });

    if(hit) { mojePos = {x:25, y:25}; return; }
    mojePos = {x:nx, y:ny};
    
    const goal = document.querySelector('.goal');
    if(nx < parseInt(goal.style.left)+60 && nx+28 > parseInt(goal.style.left) && ny < parseInt(goal.style.top)+60 && ny+28 > parseInt(goal.style.top)) {
        hotov = true; db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({ finish: true });
    }
}

function vykresliHraci(h) {
    document.querySelectorAll('.player').forEach(p => p.remove());
    for(let id in h) {
        let d = document.createElement('div'); d.className = 'player';
        d.style.left = h[id].x+"px"; d.style.top = h[id].y+"px";
        d.style.background = (id === mujId) ? 'var(--p)' : 'rgba(255,255,255,0.3)';
        document.getElementById('map').appendChild(d);
    }
}

function openShop() { alert("Obchod bude brzy otevÝen!"); }
</script>
</body>
</html>
