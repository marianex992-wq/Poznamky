<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Herní Rozvrh & Směny Hráčů</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Moderní temné gaming pozadí s fialovo-modrým zářením */
        body {
            background: linear-gradient(180deg, #090d16 0%, #05070c 100%), 
                        radial-gradient(circle at 50% -20%, #3b82f6 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #8b5cf6 0%, transparent 40%);
            background-blend-mode: screen;
            min-height: 100vh;
        }

        /* Vylepšené barvy buněk, které skvěle svítí na mobilu i PC */
        .cell-gray { background: rgba(30, 41, 59, 0.7) !important; color: #f8fafc !important; border-color: rgba(71, 85, 105, 0.5) !important; }
        .cell-blue { background: rgba(29, 78, 216, 0.7) !important; color: #93c5fd !important; border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .cell-green { background: rgba(4, 120, 87, 0.7) !important; color: #6ee7b7 !important; border-color: #10b981 !important; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .cell-yellow { background: rgba(180, 83, 9, 0.7) !important; color: #fde047 !important; border-color: #eab308 !important; box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }
        .cell-red { background: rgba(185, 28, 28, 0.7) !important; color: #fca5a5 !important; border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }

        /* Responzivní chování textových polí */
        .custom-table input:disabled {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            cursor: default;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .custom-table select:disabled {
            display: none !important;
        }

        /* Plynulé scrollování pro mobily */
        .table-container {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-100 font-sans antialiased">

    <div class="max-w-7xl mx-auto space-y-4">
        
        <div class="flex flex-col sm:flex-row justify-between items-center bg-slate-900/90 border border-slate-800 p-4 md:p-6 rounded-2xl shadow-2xl gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-gamepad text-lg text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-white tracking-tight">Live Rozvrh Hráčů</h1>
                    <p class="text-[11px] text-slate-400 font-medium">Posunutím prstem do stran zobrazíš celou tabulku</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                <div id="statusMessage" class="text-xs font-semibold px-3 py-2 rounded-xl hidden bg-rose-500/20 text-rose-400 border border-rose-500/30"></div>

                <button id="saveAllBtn" class="hidden px-5 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold rounded-xl transition shadow-lg items-center gap-2 cursor-pointer text-sm">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Uložit
                </button>

                <button id="adminBtn" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-amber-400 font-bold rounded-xl transition border border-slate-700 flex items-center gap-2 cursor-pointer text-sm">
                    <i class="fa-solid fa-lock" id="adminIcon"></i>
                    <span id="adminText">Čtení</span>
                </button>
            </div>
        </div>

        <div class="bg-slate-900/70 border border-slate-800 rounded-2xl shadow-2xl p-2 md:p-4 table-container overflow-x-auto">
            <table class="w-full border-separate border-spacing-1.5 custom-table min-w-[750px] md:min-w-[1000px]">
                <thead>
                    <tr class="text-slate-400 text-xs md:text-sm">
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800">
                            <input type="text" id="col0" disabled value="Pozice / Čas" class="w-full text-center bg-transparent font-black tracking-wider uppercase text-xs text-amber-500 focus:outline-none">
                        </th>
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800"><input type="text" id="col1" disabled value="Sloupec 1" class="w-full text-center bg-transparent font-bold focus:outline-none"></th>
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800"><input type="text" id="col2" disabled value="Sloupec 2" class="w-full text-center bg-transparent font-bold focus:outline-none"></th>
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800"><input type="text" id="col3" disabled value="Sloupec 3" class="w-full text-center bg-transparent font-bold focus:outline-none"></th>
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800"><input type="text" id="col4" disabled value="Sloupec 4" class="w-full text-center bg-transparent font-bold focus:outline-none"></th>
                        <th class="p-2 w-32 md:w-44 bg-slate-950/60 rounded-xl border border-slate-800"><input type="text" id="col5" disabled value="Sloupec 5" class="w-full text-center bg-transparent font-bold focus:outline-none"></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDl7LefJrniJ_4RbXmP6dTARNHyMkB0yFI",
            authDomain: "kalendar-70f7a.firebaseapp.com",
            projectId: "kalendar-70f7a",
            storageBucket: "kalendar-70f7a.firebasestorage.app",
            messagingSenderId: "63936026731",
            appId: "1:63936026731:web:c3f4fbf4209c55ae24792e",
            measurementId: "G-XWK3NBNNLG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isAdmin = false;
        const ADMIN_PIN = "140514"; 
        const TOTAL_ROWS = 7; // Zkráceno na 7 řádků podle přání

        const adminBtn = document.getElementById('adminBtn');
        const adminIcon = document.getElementById('adminIcon');
        const adminText = document.getElementById('adminText');
        const saveAllBtn = document.getElementById('saveAllBtn');
        const tableBody = document.getElementById('tableBody');
        const statusMessage = document.getElementById('statusMessage');

        function showStatus(text, isError = true) {
            statusMessage.textContent = text;
            statusMessage.classList.remove('hidden', 'bg-rose-500/20', 'text-rose-400', 'border-rose-500/30', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
            if (isError) {
                statusMessage.classList.add('bg-rose-500/20', 'text-rose-400', 'border-rose-500/30');
            } else {
                statusMessage.classList.add('bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
            }
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 4000);
        }

        // Vykreslení 7 řádků
        for (let r = 1; r <= TOTAL_ROWS; r++) {
            const tr = document.createElement('tr');
            
            const tdLabel = document.createElement('td');
            tdLabel.className = "p-1 bg-slate-950/40 rounded-xl border border-slate-800";
            const rowInput = document.createElement('input');
            rowInput.type = "text";
            rowInput.id = `rowlabel-${r}`;
            rowInput.disabled = true;
            rowInput.value = `Řádek ${r}`;
            rowInput.className = "w-full p-2 text-xs md:text-sm font-semibold text-slate-300 bg-transparent text-center focus:outline-none";
            tdLabel.appendChild(rowInput);
            tr.appendChild(tdLabel);

            for (let c = 1; c <= 5; c++) {
                const td = document.createElement('td');
                td.className = "p-1 bg-slate-800/30 rounded-xl border border-slate-700/40 transition-all duration-150 relative group";
                td.id = `td-${r}-${c}`;
                
                const input = document.createElement('input');
                input.type = "text";
                input.id = `cell-${r}-${c}`;
                input.disabled = true;
                input.placeholder = "-";
                input.className = "w-full p-2 text-xs md:text-sm font-bold bg-transparent text-center focus:outline-none rounded-lg transition-all";
                
                const selectColor = document.createElement('select');
                selectColor.id = `color-${r}-${c}`;
                selectColor.disabled = true;
                selectColor.className = "absolute bottom-0.5 right-0.5 text-[8px] md:text-[9px] bg-slate-950/95 text-slate-300 border border-slate-700 rounded px-0.5 focus:outline-none opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer z-10";
                selectColor.innerHTML = `
                    <option value="gray">🔘 Šedá</option>
                    <option value="blue">🔵 Modrá</option>
                    <option value="green">🟢 Zelená</option>
                    <option value="yellow">🟡 Žlutá</option>
                    <option value="red">🔴 Červená</option>
                `;

                selectColor.addEventListener('change', () => {
                    applyCellColor(td, selectColor.value);
                });

                td.appendChild(input);
                td.appendChild(selectColor);
                tr.appendChild(td);
            }
            tableBody.appendChild(tr);
        }

        const allInputs = document.querySelectorAll('table input');
        const allSelects = document.querySelectorAll('table select');

        function applyCellColor(element, colorName) {
            element.className = "p-1 rounded-xl border transition-all duration-150 relative group";
            if(colorName === 'blue') element.classList.add('cell-blue');
            else if(colorName === 'green') element.classList.add('cell-green');
            else if(colorName === 'yellow') element.classList.add('cell-yellow');
            else if(colorName === 'red') element.classList.add('cell-red');
            else element.classList.add('cell-gray');
        }

        // ŽIVÉ NAČÍTÁNÍ Z DATABÁZE
        onSnapshot(doc(db, "grid_schedule", "data"), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                allInputs.forEach(input => {
                    if (data[input.id] !== undefined) input.value = data[input.id];
                });
                allSelects.forEach(select => {
                    if (data[select.id] !== undefined) {
                        select.value = data[select.id];
                        const [,, r, c] = select.id.split('-');
                        const td = document.getElementById(`td-${r}-${c}`);
                        if(td) applyCellColor(td, data[select.id]);
                    }
                });
            }
        }, (error) => {
            console.error("Chyba synchronizace: ", error);
            showStatus("Hráči nemají přístup k datům.");
        });

        // PŘIHLÁŠENÍ ADMINA
        adminBtn.addEventListener('click', () => {
            if (!isAdmin) {
                const pin = prompt("Zadej tvůj tajný Admin PIN:");
                if (pin === ADMIN_PIN) {
                    isAdmin = true;
                    toggleFields(false);
                    adminBtn.className = "px-5 py-2.5 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-black rounded-xl transition flex items-center gap-2 cursor-pointer shadow-lg text-sm";
                    adminText.textContent = "Admin";
                    adminIcon.className = "fa-solid fa-lock-open text-slate-950";
                    saveAllBtn.classList.remove('hidden');
                    saveAllBtn.classList.add('flex');
                    showStatus("Tabulka odemčena k úpravám.", false);
                } else if (pin !== null) {
                    alert("Špatný kód!");
                }
            } else {
                isAdmin = false;
                toggleFields(true);
                adminBtn.className = "px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-amber-400 font-bold rounded-xl transition border border-slate-700 flex items-center gap-2 cursor-pointer text-sm";
                adminText.textContent = "Čtení";
                adminIcon.className = "fa-solid fa-lock";
                saveAllBtn.classList.add('hidden');
            }
        });

        function toggleFields(status) {
            allInputs.forEach(input => input.disabled = status);
            allSelects.forEach(select => select.disabled = status);
        }

        // UKLÁDÁNÍ
        saveAllBtn.addEventListener('click', async () => {
            if (!isAdmin) return;

            const updateData = {};
            allInputs.forEach(input => updateData[input.id] = input.value);
            allSelects.forEach(select => updateData[select.id] = select.value);
            updateData['cell_admin_verify'] = "140514"; 

            try {
                await setDoc(doc(db, "grid_schedule", "data"), updateData);
                showStatus("Změny a barvy uloženy pro všechny hráče!", false);
            } catch (error) {
                console.error("Chyba ukládání: ", error);
                showStatus("Chyba ukládání. Zkontroluj Rules ve Firebase.");
            }
        });
    </script>
</body>
</html>
