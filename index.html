<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAZE MADNESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --p: #fe2c55; --accent: #25F4EE; --gold: #FFD700; --bg: #05050a; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            user-select: none;
            color: #fff;
        }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        
        /* Animované pozadí lobby */
        #screen-start, #screen-lobby, #screen-shop {
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
        }

        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 40px; 
            text-align: center; 
            width: 90%; 
            max-width: 360px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        h1 { margin: 0 0 10px 0; font-size: 36px; font-weight: 900; letter-spacing: -2px; text-transform: uppercase; font-style: italic; color: #fff; text-shadow: 0 0 20px var(--p); }
        .subtitle { font-size: 12px; opacity: 0.6; margin-bottom: 25px; letter-spacing: 2px; }

        input { width: 100%; padding: 16px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; font-size: 16px; font-weight: bold; text-align: center; outline: none; background: rgba(0,0,0,0.4); color: #fff; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }

        .btn { background: var(--p); color: #fff; border: none; padding: 16px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: 900; font-size: 16px; text-transform: uppercase; transition: 0.2s; margin-top: 12px; letter-spacing: 1px; }
        .btn:active { transform: scale(0.96); }
        .btn-sec { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-accent { background: var(--accent); color: #000; }

        .diff-box { display: flex; gap: 10px; margin: 15px 0; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 20px; }
        .diff-opt { flex: 1; font-size: 11px; font-weight: 900; padding: 12px 2px; cursor: pointer; border-radius: 15px; color: #666; transition: 0.3s; }
        .diff-opt.active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        #lobby-list { text-align:left; padding:20px; background: rgba(0,0,0,0.3); border-radius:25px; margin:15px 0; min-height: 120px; border: 1px solid rgba(255,255,255,0.05); }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 600; }

        .wallet { position: absolute; top: 30px; right: 30px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 10px; z-index: 2000; }
        .wallet span { color: var(--gold); font-weight: 900; font-size: 18px; }

        #game { display: none; width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: calc(100% - 160px); position: absolute; top: 0; }
        
        /* SKINY */
        .player { position: absolute; width: 28px; height: 28px; border-radius: 8px; z-index: 500; transition: 0.08s linear; border: 2px solid #fff; }
        .skin-default { background: #555; }
        .skin-neon { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .skin-gold { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .skin-rainbow { animation: rainbow 2s linear infinite; }
        @keyframes rainbow { 
            0% { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
            33% { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
            66% { background: #0000ff; box-shadow: 0 0 15px #0000ff; }
            100% { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        .p-name { position: absolute; top: -28px; background: #000; color: #fff; padding: 2px 10px; font-size: 10px; border-radius: 6px; white-space: nowrap; left: 50%; transform: translateX(-50%); font-weight: bold; border: 1px solid rgba(255,255,255,0.3); }

        .obs { position: absolute; width: 40px; height: 40px; border-radius: 10px; box-sizing: border-box; }
        .goal { 
            position: absolute; width: 64px; height: 64px; border: 4px dashed #fff; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 12px; 
            background: rgba(255,255,255,0.1); font-weight: 900; z-index: 400; color: #fff;
            animation: rotate 5s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #hud { position: fixed; top: 20px; width: 100%; text-align: center; font-size: 18px; font-weight: 900; z-index: 2000; pointer-events: none; letter-spacing: 1px; }
        #waiting { position: fixed; top: 40%; width: 100%; text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(0,0,0,1); display: none; z-index: 2500; }

        #bottom-bar { position: fixed; bottom: 0; width: 100%; height: 160px; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        #controls { display: grid; grid-template-columns: repeat(3, 72px); gap: 15px; }
        .c-btn { width: 72px; height: 72px; background: #111; border: 2px solid rgba(255,255,255,0.1); border-radius: 22px; font-size: 28px; display: flex; justify-content: center; align-items: center; color: #fff; }
        .c-btn:active { background: #fff; color: #000; transform: scale(0.9); }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .shop-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .shop-item.owned { border-color: rgba(255,255,255,0.1); }
        .shop-item.selected { background: #fff; color: #000; }
        .item-prev { width: 32px; height: 32px; margin: 0 auto 8px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="wallet">?? <span id="coin-val">0</span></div>

<div id="screen-start" class="screen">
    <div class="card">
        <h1>MAZE MADNESS</h1>
        <div class="subtitle">MULTIPLAYER CHALLENGE</div>
        
        <input id="nick" placeholder="TVOJE PŘEZDÍVKA" maxlength="10">
        
        <div class="diff-box">
            <div class="diff-opt active" onclick="setDiff('easy', 10, this)">EASY</div>
            <div class="diff-opt" onclick="setDiff('hard', 15, this)">HARD</div>
            <div class="diff-opt" onclick="setDiff('extrem', 30, this)">EXTREM</div>
        </div>
        
        <button class="btn" onclick="hostHru()">VYTVOŘIT HRU</button>
        <button class="btn btn-sec" onclick="openShop()">OBCHOD SE SKINY</button>
        
        <div style="margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
        
        <input id="room-input" placeholder="KÓD POKOJE">
        <button class="btn btn-accent" onclick="pripojHru()">PŘIPOJIT SE</button>
    </div>
</div>

<div id="screen-lobby" class="screen" style="display:none">
    <div class="card">
        <h2 style="margin:0; font-size:14px; opacity:0.6; text-transform:uppercase;">ID Pokoje</h2>
        <div id="display-code" style="font-size:42px; font-weight:900; color:var(--accent); margin-bottom:10px;">----</div>
        
        <div id="lobby-list"></div>
        
        <div style="font-size:11px; margin-bottom:20px; font-weight:bold; letter-spacing:1px;">
            MÓD: <span id="mode-text" style="color:var(--p)">EASY</span>
        </div>
        
        <button id="start-btn" class="btn" style="display:none" onclick="odstartovat()">ODSTARTOVAT ZÁPAS</button>
        <p id="wait-msg" style="font-size:10px; opacity:0.5;">ČEKÁME NA HOSTITELE...</p>
    </div>
</div>

<div id="screen-shop" class="screen" style="display:none">
    <div class="card">
        <h2>SKIN SHOP</h2>
        <div class="shop-grid">
            <div class="shop-item owned selected" onclick="buySkin('default', 0)">
                <div class="item-prev skin-default"></div>
                <div style="font-size:10px; font-weight:bold;">ZÁKLADNÍ</div>
            </div>
            <div class="shop-item" id="skin-neon" onclick="buySkin('neon', 50)">
                <div class="item-prev skin-neon"></div>
                <div style="font-size:10px; font-weight:bold;">NEON (50)</div>
            </div>
            <div class="shop-item" id="skin-gold" onclick="buySkin('gold', 100)">
                <div class="item-prev skin-gold"></div>
                <div style="font-size:10px; font-weight:bold;">ZLATÝ (100)</div>
            </div>
            <div class="shop-item" id="skin-rainbow" onclick="buySkin('rainbow', 250)">
                <div class="item-prev skin-rainbow"></div>
                <div style="font-size:10px; font-weight:bold;">DUHA (250)</div>
            </div>
        </div>
        <button class="btn btn-sec" onclick="closeShop()">ZPĚT DO MENU</button>
    </div>
</div>

<div id="win-screen" class="screen" style="display:none">
    <div class="card">
        <h1 style="color:var(--gold)">VÍTĚZ!</h1>
        <p>Prošel jsi všemi nástrahami bludiště.</p>
        <button class="btn" onclick="location.reload()">DO MENU</button>
    </div>
</div>

<div id="game">
    <div id="hud"><span id="biom-name" style="color:var(--accent)">MAPA</span> <span style="opacity:0.3;margin:0 10px;">|</span> LVL: <span id="lvl">1</span>/<span id="max-lvl">10</span></div>
    <div id="waiting">LEVEL DOKONČEN! ČEKÁ SE...</div>
    <div id="map"></div>
    <div id="bottom-bar">
        <div id="controls">
            <div></div><button class="c-btn" onpointerdown="pohyb('u')">^</button><div></div>
            <button class="c-btn" onpointerdown="pohyb('l')">?</button>
            <button class="c-btn" onpointerdown="pohyb('d')">ˇ</button>
            <button class="c-btn" onpointerdown="pohyb('r')">?</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://mejdrixgame-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let mujId = "u" + Math.floor(Math.random() * 9999);
let mojeJmeno = "", mojeMisto = "", jeHost = false, aktualniLevel = 1, hotov = false;
let mojePos = { x: 30, y: 30 };
let obtiznost = "easy", maxLevelu = 10;

// UKLÁDÁNÍ DAT
let coins = parseInt(localStorage.getItem('mm_coins')) || 0;
let ownedSkins = JSON.parse(localStorage.getItem('mm_skins')) || ['default'];
let activeSkin = localStorage.getItem('mm_active_skin') || 'default';

document.getElementById('coin-val').innerText = coins;

const mapy = [
    { n: "OCEÁN", bg: "#003344", ob: "#00aaff" },
    { n: "LES", bg: "#1a331a", ob: "#2ecc71" },
    { n: "ANTARKTIDA", bg: "#d1f2ff", ob: "#ffffff", dark: true },
    { n: "VOLCANO", bg: "#330000", ob: "#e74c3c" },
    { n: "POUŠŤ", bg: "#3d2b1f", ob: "#d35400" },
    { n: "KYBERPROSTOR", bg: "#0a0a1a", ob: "#00ffcc", neon: true },
    { n: "VESMÍR", bg: "#050015", ob: "#9b59b6", neon: true },
    { n: "PEKLO", bg: "#150000", ob: "#ff0000", neon: true }
];

function setDiff(d, m, el) {
    obtiznost = d; maxLevelu = m;
    document.querySelectorAll('.diff-opt').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
}

function openShop() { 
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-shop').style.display = 'flex';
    updateShopUI();
}
function closeShop() { 
    document.getElementById('screen-shop').style.display = 'none';
    document.getElementById('screen-start').style.display = 'flex';
}

function updateShopUI() {
    document.querySelectorAll('.shop-item').forEach(item => {
        const sName = item.onclick.toString().match(/'(.*?)'/)[1];
        item.className = 'shop-item';
        if(ownedSkins.includes(sName)) item.classList.add('owned');
        if(activeSkin === sName) item.classList.add('selected');
    });
}

function buySkin(name, price) {
    if(ownedSkins.includes(name)) {
        activeSkin = name;
    } else if(coins >= price) {
        coins -= price;
        ownedSkins.push(name);
        activeSkin = name;
        localStorage.setItem('mm_coins', coins);
        localStorage.setItem('mm_skins', JSON.stringify(ownedSkins));
        document.getElementById('coin-val').innerText = coins;
    }
    localStorage.setItem('mm_active_skin', activeSkin);
    updateShopUI();
}

async function hostHru() {
    mojeJmeno = document.getElementById('nick').value || "Hráč";
    mojeMisto = Math.floor(1000 + Math.random() * 9000).toString();
    jeHost = true;
    await db.ref('rooms/' + mojeMisto).set({ status: 'lobby', level: 1, mode: obtiznost, maxLvl: maxLevelu });
    vstoupitDoLobby();
}

async function pripojHru() {
    mojeJmeno = document.getElementById('nick').value || "Hráč";
    mojeMisto = document.getElementById('room-input').value;
    if(!mojeMisto) return;
    const snap = await db.ref('rooms/' + mojeMisto).once('value');
    if(snap.exists()) {
        let rd = snap.val();
        obtiznost = rd.mode; maxLevelu = rd.maxLvl;
        vstoupitDoLobby();
    }
}

function vstoupitDoLobby() {
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-lobby').style.display = 'flex';
    document.getElementById('display-code').innerText = mojeMisto;
    document.getElementById('mode-text').innerText = obtiznost.toUpperCase() + " (" + maxLevelu + " LEVELŮ)";
    
    if(jeHost) {
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('wait-msg').style.display = 'none';
    }

    db.ref('rooms/'+mojeMisto+'/players/'+mujId).set({ name: mojeJmeno, x: 30, y: 30, skin: activeSkin, finish: false });
    db.ref('rooms/'+mojeMisto+'/players/'+mujId).onDisconnect().remove();

    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => {
        const list = document.getElementById('lobby-list'); list.innerHTML = "";
        let allDone = true, count = 0;
        snap.forEach(p => {
            count++;
            let pd = p.val();
            list.innerHTML += `<div class="player-row"><span>${pd.name}</span> <span>${pd.finish ? '? READY' : '?...'}</span></div>`;
            if(!pd.finish) allDone = false;
        });

        if(jeHost && allDone && count > 0) {
            db.ref('rooms/'+mojeMisto+'/status').once('value', s => {
                if(s.val() === 'go') {
                    // ODMĚNA ZA KOLO
                    coins += 15;
                    localStorage.setItem('mm_coins', coins);
                    document.getElementById('coin-val').innerText = coins;
                    
                    if(aktualniLevel < maxLevelu) {
                        setTimeout(() => {
                            let up = {};
                            snap.forEach(p => { up['players/'+p.key+'/finish'] = false; });
                            up['level'] = aktualniLevel + 1;
                            db.ref('rooms/'+mojeMisto).update(up);
                        }, 1200);
                    } else { db.ref('rooms/'+mojeMisto).update({ status: 'winner' }); }
                }
            });
        }
    });

    db.ref('rooms/'+mojeMisto+'/status').on('value', snap => {
        if(snap.val() === 'go') spustitHru();
        if(snap.val() === 'winner') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('win-screen').style.display = 'flex';
        }
    });
}

function odstartovat() { db.ref('rooms/'+mojeMisto).update({ status: 'go' }); }

function spustitHru() {
    document.getElementById('screen-lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('max-lvl').innerText = maxLevelu;
    db.ref('rooms/'+mojeMisto+'/level').on('value', snap => { 
        if(snap.val()) { aktualniLevel = snap.val(); resetLevelu(); }
    });
    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => { vykreslitHrace(snap.val()); });
    setInterval(() => { if(!hotov) db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({x:mojePos.x, y:mojePos.y}); }, 50);
}

function resetLevelu() {
    hotov = false;
    document.getElementById('waiting').style.display = "none";
    document.getElementById('lvl').innerText = aktualniLevel;
    const m = mapy[(aktualniLevel - 1) % mapy.length];
    document.getElementById('biom-name').innerText = m.n;
    document.getElementById('game').style.background = m.bg;
    document.getElementById('hud').style.color = m.dark ? "#000" : "#fff";
    
    const map = document.getElementById('map'); map.innerHTML = "";
    mojePos = { x: 25, y: 25 };

    const size = 40;
    const cols = Math.floor(window.innerWidth / size);
    const rows = Math.floor((window.innerHeight - 160) / size);
    
    let baseObt = 0.14;
    if(obtiznost == "hard") baseObt = 0.20;
    if(obtiznost == "extrem") baseObt = 0.26;
    const obt = baseObt + (aktualniLevel * 0.005);

    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            // BEZPEČNÁ CESTA: Nezakrývat start ani cíl
            if((r < 3 && c < 3) || (r > rows-4 && c > cols-4)) continue;
            
            if(Math.random() < obt) {
                let o = document.createElement('div');
                o.className = 'obs'; o.style.background = m.ob;
                if(m.neon) o.style.boxShadow = "0 0 15px " + m.ob;
                o.style.left = c * size + "px"; o.style.top = r * size + "px";
                map.appendChild(o);
            }
        }
    }
    
    let g = document.createElement('div'); 
    g.className = 'goal'; g.innerHTML = "CÍL"; 
    g.style.left = (cols - 2) * size + "px";
    g.style.top = (rows - 2) * size + "px";
    map.appendChild(g);
}

function pohyb(s) {
    if(hotov) return;
    let k = 20, nx = mojePos.x, ny = mojePos.y;
    if(s=='u') ny -= k; if(s=='d') ny += k;
    if(s=='l') nx -= k; if(s=='r') nx += k;
    
    if(nx < 0 || nx > window.innerWidth-28 || ny < 0 || ny > (window.innerHeight-160)-28) return;
    
    let hit = false;
    document.querySelectorAll('.obs').forEach(o => {
        let ox = parseInt(o.style.left), oy = parseInt(o.style.top);
        if(nx < ox+40 && nx+28 > ox && ny < oy+40 && ny+28 > oy) hit = true;
    });

    if(hit) { mojePos = {x:25, y:25}; return; } 

    mojePos.x = nx; mojePos.y = ny;
    const goal = document.querySelector('.goal');
    let gx = parseInt(goal.style.left), gy = parseInt(goal.style.top);
    if(nx < gx+60 && nx+28 > gx && ny < gy+60 && ny+28 > gy) {
        hotov = true;
        document.getElementById('waiting').style.display = "block";
        db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({ finish: true });
    }
}

function vykreslitHrace(hraci) {
    document.querySelectorAll('.player').forEach(p => p.remove());
    for(let id in hraci) {
        let p = hraci[id];
        let d = document.createElement('div');
        d.className = `player skin-${p.skin || 'default'}`;
        d.style.left = p.x + "px"; d.style.top = p.y + "px";
        if(p.finish) d.style.opacity = "0.3";
        d.innerHTML = `<div class="p-name">${p.name} ${p.finish?'?':''}</div>`;
        document.getElementById('map').appendChild(d);
    }
}
</script>
</body>
</html>
