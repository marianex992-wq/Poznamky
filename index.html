<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAZE MADNESS</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #fe2c55; /* Neonová Růžová */
            --accent: #25F4EE; /* Neonová Tyrkysová */
            --gold: #FFD700; 
            --bg: #05050a; /* Černomodré pozadí */
            --font-game: 'Oswald', sans-serif;
            --font-ui: 'Montserrat', sans-serif;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none;
            user-select: none;
        }

        body { 
            margin: 0; 
            font-family: var(--font-ui);
            background: var(--bg); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            color: #fff;
        }

        /* --- ANIMOVANÉ 3D GRID POZADÍ --- */
        body::before {
            content: '';
            position: absolute;
            inset: -100px;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: center center;
            transform: perspective(1000px) rotateX(60deg) translateY(0px);
            animation: gridMove 10s linear infinite;
            z-index: 0;
            opacity: 0.5;
        }

        @keyframes gridMove {
            0% { transform: perspective(1000px) rotateX(60deg) translateY(0px); }
            100% { transform: perspective(1000px) rotateX(60deg) translateY(100px); }
        }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        
        /* --- GLASSMORPHISM KARTA --- */
        .card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 35px; 
            text-align: center; 
            width: 100%; 
            max-width: 360px; 
            border: 2px solid rgba(255,255,255,0.08); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* Barevný okrajový efekt karty */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--p), var(--accent), var(--gold));
            z-index: -1;
            border-radius: 35px;
            opacity: 0.3;
            filter: blur(5px);
        }

        h1 { 
            font-family: var(--font-game);
            margin: 0 0 10px 0; 
            font-size: 38px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #fff; 
            text-shadow: 0 0 20px var(--p), 0 0 10px rgba(254,44,85,0.5); 
            letter-spacing: -1px;
        }
        .subtitle { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; font-weight: 700; }

        input { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 18px; font-size: 16px; font-weight: bold; text-align: center; outline: none; background: rgba(0,0,0,0.5); color: #fff; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.7); box-shadow: 0 0 15px rgba(37,244,238,0.3); }

        .btn { 
            background: var(--p); 
            color: #fff; 
            border: none; 
            padding: 16px; 
            border-radius: 18px; 
            cursor: pointer; 
            width: 100%; 
            font-family: var(--font-game);
            font-weight: 700; 
            font-size: 17px; 
            text-transform: uppercase; 
            transition: 0.2s; 
            margin-top: 12px; 
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(254,44,85,0.3);
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(254,44,85,0.2); }
        .btn::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(rgba(255,255,255,0.1), transparent); transform: rotate(30deg); transition: 0.3s; opacity: 0; }
        .btn:hover::after { opacity: 1; left: 0; top: 0; }

        .btn-sec { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1); box-shadow: none; color: rgba(255,255,255,0.7); }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 20px rgba(37,244,238,0.3); }

        /* --- MODERNÍ LOBBY LIST --- */
        #lobby-list { text-align:left; padding:15px; background: rgba(0,0,0,0.3); border-radius:20px; margin:20px 0; min-height: 120px; border: 1px solid rgba(255,255,255,0.05); }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 14px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .player-row:last-child { border-bottom: none; }
        .player-ready { color: var(--accent); font-weight: 900; }
        .player-waiting { color: rgba(255,255,255,0.4); font-weight: 600; }

        /* --- PENĚŽENKA A SHOP V ROHECH --- */
        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; }
        .wallet-ui { 
            background: rgba(0,0,0,0.7); 
            padding: 10px 20px; 
            border-radius: 50px; 
            border: 2px solid var(--gold); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .wallet-ui span { color: var(--gold); font-weight: 900; font-size: 19px; text-shadow: 0 0 10px var(--gold); }
        .wallet-icon { font-size: 16px; margin-right: 5px; }

        .btn-shop-ui { width: auto; padding: 10px 25px; margin: 0; background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 12px; }
        .btn-shop-ui:active { transform: scale(0.95); }

        #game { display: none; width: 100vw; height: 100vh; position: relative; z-index: 10; }
        #map { width: 100%; height: calc(100% - 160px); position: absolute; top: 0; overflow: hidden; }
        
        /* --- SKINY HRÁČE (BEZ ZMĚNY POHYBU) --- */
        .player { position: absolute; width: 28px; height: 28px; border-radius: 8px; z-index: 500; transition: 0.1s linear; border: 3px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .skin-default { background: #666; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .skin-neon { background: var(--accent); border-color: #fff; box-shadow: 0 0 20px var(--accent), 0 0 10px #fff; }
        .skin-gold { background: var(--gold); border-color: #fff; box-shadow: 0 0 20px var(--gold), 0 0 10px #fff; }
        .skin-rainbow { border-color: #fff; animation: rainbowSkin 2s linear infinite, glow 1.5s ease-in-out infinite alternate; }

        @keyframes rainbowSkin { 0% { background: #ff0000; } 33% { background: #00ff00; } 66% { background: #0000ff; } 100% { background: #ff0000; } }
        @keyframes glow { 0% { box-shadow: 0 0 5px #fff, 0 0 10px #fff; } 100% { box-shadow: 0 0 20px #fff, 0 0 15px #fff; } }

        .p-name { position: absolute; top: -30px; background: rgba(0,0,0,0.8); color: #fff; padding: 3px 10px; font-size: 10px; border-radius: 8px; white-space: nowrap; left: 50%; transform: translateX(-50%); font-weight: 800; border: 1px solid rgba(255,255,255,0.2); }

        /* --- OBCHOD --- */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .shop-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; transition: 0.3s; position: relative; }
        .shop-item.owned { border-color: rgba(255,255,255,0.08); }
        .shop-item.selected { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .shop-item:hover { background: rgba(255,255,255,0.08); }
        .item-prev { width: 35px; height: 35px; margin: 0 auto 10px; border-radius: 8px; border: 3px solid rgba(255,255,255,0.3); }

        /* --- ZDI V MAPĚ --- */
        .obs { position: absolute; width: 40px; height: 40px; border-radius: 12px; box-sizing: border-box; background: rgba(255,255,255,0.05); }

        /* --- CÍL V MAPĚ (PROFI OBŘYS A EFEKT) --- */
        .goal { 
            position: absolute; width: 66px; height: 66px; border: 5px solid transparent; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 12px; 
            background: rgba(255,255,255,0.03); font-weight: 900; z-index: 400; color: #fff;
            animation: rotatePulse 4s linear infinite;
        }
        /* Cíl má neonový pulsní obrys */
        .goal::before {
            content: 'CÍL';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 5px dashed #fff;
            animation: goalGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes rotatePulse { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.05); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes goalGlow { 0% { box-shadow: 0 0 5px #fff, 0 0 10px #fff; opacity: 0.7; } 100% { box-shadow: 0 0 20px #fff, 0 0 15px #fff; opacity: 1; } }

        /* --- HUD VE HŘE --- */
        #hud { position: fixed; top: 20px; width: 100%; text-align: center; font-family: var(--font-game); font-size: 20px; font-weight: 700; z-index: 2000; pointer-events: none; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        #biom-name { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        #waiting { position: fixed; top: 40%; width: 100%; text-align: center; font-size: 26px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(0,0,0,1); display: none; z-index: 2500; text-transform: uppercase; font-family: var(--font-game); }

        /* --- SPODNÍ OVLÁDACÍ LIŠTA --- */
        #bottom-bar { position: fixed; bottom: 0; width: 100%; height: 160px; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: center; align-items: center; z-index: 3000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 15px; }
        .c-btn { width: 75px; height: 75px; background: #1a1a2a; border: 2px solid rgba(255,255,255,0.1); border-radius: 25px; font-size: 30px; display: flex; justify-content: center; align-items: center; color: #fff; transition: 0.1s; }
        .c-btn:active { background: #fff; color: #000; transform: scale(0.9); box-shadow: 0 0 15px #fff; }

    </style>
</head>
<body>

<div class="top-ui">
    <div class="wallet-ui">?? <span id="coin-val">0</span></div>
    <button class="btn btn-sec btn-shop-ui" id="shop-btn-lobby" onclick="openShop()">SHOP</button>
</div>

<div id="screen-start" class="screen">
    <div class="card">
        <h1>MAZE MADNESS</h1>
        <div class="subtitle">MULTIPLAYER LABYRINT</div>
        
        <input id="nick" placeholder="TVOJE PŘEZDÍVKA" maxlength="10">
        
        <div class="diff-box">
            <div class="diff-opt active" onclick="setDiff('easy', 10, this)">EASY</div>
            <div class="diff-opt" onclick="setDiff('hard', 15, this)">HARD</div>
            <div class="diff-opt" onclick="setDiff('extrem', 30, this)">EXTREM</div>
        </div>
        
        <button class="btn" onclick="hostHru()">VYTVOŘIT HRU</button>
        
        <div style="margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
        
        <input id="room-input" placeholder="KÓD POKOJE">
        <button class="btn btn-accent" onclick="pripojHru()">PŘIPOJIT SE</button>
    </div>
</div>

<div id="screen-lobby" class="screen" style="display:none">
    <div class="card">
        <h2 style="margin:0; font-size:12px; opacity:0.6; text-transform:uppercase;">KÓD POKOJE</h2>
        <div id="display-code" style="font-size:42px; font-weight:900; color:var(--accent); margin-bottom:10px; text-shadow: 0 0 20px var(--accent);">----</div>
        
        <div id="lobby-list"></div>
        
        <div style="font-size:12px; margin-bottom:20px; font-weight:bold; text-transform:uppercase; opacity:0.7;">
            MÓD: <span id="mode-text" style="color:#fff">EASY</span>
        </div>
        
        <button id="start-btn" class="btn" style="display:none" onclick="odstartovat()">ODSTARTOVAT ZÁPAS</button>
        <p id="wait-msg" style="font-size:10px; opacity:0.5; text-transform:uppercase; margin-top:15px;">ČEKÁME NA HOSTITELE...</p>
    </div>
</div>

<div id="screen-shop" class="screen" style="display:none">
    <div class="card">
        <h1>SKIN SHOP</h1>
        <div class="shop-grid">
            <div class="shop-item owned selected" onclick="buySkin('default', 0)">
                <div class="item-prev skin-default"></div>
                <div style="font-size:10px; font-weight:800;">ZÁKLADNÍ</div>
            </div>
            <div class="shop-item" id="skin-neon" onclick="buySkin('neon', 50)">
                <div class="item-prev skin-neon"></div>
                <div style="font-size:10px; font-weight:800;">NEON (50)</div>
            </div>
            <div class="shop-item" id="skin-gold" onclick="buySkin('gold', 100)">
                <div class="item-prev skin-gold"></div>
                <div style="font-size:10px; font-weight:800;">ZLATÝ (100)</div>
            </div>
            <div class="shop-item" id="skin-rainbow" onclick="buySkin('rainbow', 250)">
                <div class="item-prev skin-rainbow"></div>
                <div style="font-size:10px; font-weight:800;">DUHA (250)</div>
            </div>
        </div>
        <button class="btn btn-sec" style="margin-top:25px;" onclick="closeShop()">ZPĚT DO MENU</button>
    </div>
</div>

<div id="win-screen" class="screen" style="display:none">
    <div class="card">
        <h1 style="color:var(--gold); font-size:45px;">MISTR!</h1>
        <p>Prošel jsi celým labyrintem.</p>
        <button class="btn" onclick="location.reload()">DO MENU</button>
    </div>
</div>

<div id="game">
    <div id="hud"><span id="biom-name">MAPA</span> <span style="opacity:0.3;margin:0 10px;">|</span> LVL: <span id="lvl">1</span> / <span id="max-lvl">10</span></div>
    <div id="waiting">ČEKÁ SE NA OSTATNÍ...</div>
    <div id="map"></div>
    <div id="bottom-bar">
        <div id="controls">
            <div></div><button class="c-btn" onpointerdown="pohyb('u')">^</button><div></div>
            <button class="c-btn" onpointerdown="pohyb('l')">?</button>
            <button class="c-btn" onpointerdown="pohyb('d')">ˇ</button>
            <button class="c-btn" onpointerdown="pohyb('r')">?</button>
        </div>
    </div>
</div>

<script>
// --- KONFIGURACE (ZŮSTALA STEJNÁ) ---
const firebaseConfig = { databaseURL: "https://mejdrixgame-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let mujId = "u" + Math.floor(Math.random() * 9999);
let mojeJmeno = "", mojeMisto = "", jeHost = false, aktualniLevel = 1, hotov = false;
let mojePos = { x: 30, y: 30 };
let obtiznost = "easy", maxLevelu = 10;

// UKLÁDÁNÍ DAT (BEZ ZMĚNY)
let coins = parseInt(localStorage.getItem('mm_coins')) || 0;
let ownedSkins = JSON.parse(localStorage.getItem('mm_skins')) || ['default'];
let activeSkin = localStorage.getItem('mm_active_skin') || 'default';

document.getElementById('coin-val').innerText = coins;

// --- SEZNAM MAP (ROZŠÍŘEN O NOVÉ PROFI BAREVNÉ BIOMY) ---
const mapy = [
    { n: "OCEÁN", bg: "#003344", ob: "#00aaff", cGlow: "#fff" }, // Temně modrá + neon modré zdi
    { n: "LES", bg: "#1a331a", ob: "#2ecc71", cGlow: "#fff" }, // Tmavě zelená + jasně zelené zdi
    { n: "ANTARKTIDA", bg: "#d1f2ff", ob: "#ffffff", dark: true, cGlow: "#000" }, // Bílá + černé hud + zdi
    { n: "VOLCANO", bg: "#330000", ob: "#e74c3c", cGlow: "#ff4444" }, // Černá + červená záře
    { n: "POUŠŤ", bg: "#3d2b1f", ob: "#d35400", cGlow: "#fff" }, // Hnědá + oranžové zdi
    { n: "KYBERPROSTOR", bg: "#0a0a1a", ob: "#00ffcc", neon: true, cGlow: "#00ffcc" }, // Neonově zelené zdi na černé
    { n: "VESMÍR", bg: "#050015", ob: "#9b59b6", neon: true, cGlow: "#9b59b6" }, // Neonově fialové zdi na černé
    { n: "PEKLO", bg: "#150000", ob: "#ff0000", neon: true, cGlow: "#ff0000" }, // Rudě svítící zdi
    { n: "ANTIHOTA", bg: "#d0d0d0", ob: "#111111", dark: true, cGlow: "#000" }, // Černobílá
    { n: "DUHA", bg: "#000", ob: "RAINBOW", neon: true, cGlow: "#fff" } // Duhové zdi
];

function setDiff(d, m, el) {
    obtiznost = d; maxLevelu = m;
    document.querySelectorAll('.diff-opt').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
}

function openShop() { 
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-lobby').style.display = 'none';
    document.getElementById('screen-shop').style.display = 'flex';
    document.querySelector('.top-ui').style.display = 'none'; // Schovat Wallet/Shop v shopu
    updateShopUI();
}
function closeShop() { 
    document.getElementById('screen-shop').style.display = 'none';
    // Vrátit Wallet/Shop
    document.querySelector('.top-ui').style.display = 'flex';
    if(mojeMisto){ document.getElementById('screen-lobby').style.display = 'flex'; }
    else { document.getElementById('screen-start').style.display = 'flex'; }
}

function updateShopUI() {
    document.querySelectorAll('.shop-item').forEach(item => {
        // Získat název skinu z onclick atributu
        const sName = item.onclick.toString().match(/'(.*?)'/)[1];
        item.className = 'shop-item';
        if(ownedSkins.includes(sName)) item.classList.add('owned');
        if(activeSkin === sName) item.classList.add('selected');
    });
}

function buySkin(name, price) {
    if(ownedSkins.includes(name)) {
        activeSkin = name;
    } else if(coins >= price) {
        coins -= price;
        ownedSkins.push(name);
        activeSkin = name;
        localStorage.setItem('mm_coins', coins);
        localStorage.setItem('mm_skins', JSON.stringify(ownedSkins));
        document.getElementById('coin-val').innerText = coins;
    }
    localStorage.setItem('mm_active_skin', activeSkin);
    updateShopUI();
}

async function hostHru() {
    mojeJmeno = document.getElementById('nick').value || "Hráč";
    mojeMisto = Math.floor(1000 + Math.random() * 9000).toString();
    jeHost = true;
    await db.ref('rooms/' + mojeMisto).set({ status: 'lobby', level: 1, mode: obtiznost, maxLvl: maxLevelu });
    vstoupitDoLobby();
}

async function pripojHru() {
    mojeJmeno = document.getElementById('nick').value || "Hráč";
    mojeMisto = document.getElementById('room-input').value;
    if(!mojeMisto) return;
    const snap = await db.ref('rooms/' + mojeMisto).once('value');
    if(snap.exists()) {
        let rd = snap.val();
        obtiznost = rd.mode; maxLevelu = rd.maxLvl;
        vstoupitDoLobby();
    }
}

function vstoupitDoLobby() {
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('screen-lobby').style.display = 'flex';
    document.getElementById('display-code').innerText = mojeMisto;
    document.getElementById('mode-text').innerText = obtiznost.toUpperCase() + " (" + maxLevelu + " LEVELŮ)";
    document.getElementById('shop-btn-lobby').style.display = 'block'; // Ukázat shop v lobby

    if(jeHost) {
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('wait-msg').style.display = 'none';
    }

    db.ref('rooms/'+mojeMisto+'/players/'+mujId).set({ name: mojeJmeno, x: 30, y: 30, skin: activeSkin, finish: false });
    db.ref('rooms/'+mojeMisto+'/players/'+mujId).onDisconnect().remove();

    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => {
        const list = document.getElementById('lobby-list'); list.innerHTML = "";
        let allDone = true, count = 0;
        snap.forEach(p => {
            count++;
            let pd = p.val();
            let pStatusClass = pd.finish ? 'player-ready' : 'player-waiting';
            let pStatusText = pd.finish ? 'READY ZÓNA' : 'HLEDÁM CESTU';
            list.innerHTML += `<div class="player-row"><span>${pd.name}</span> <span class="${pStatusClass}">${pStatusText}</span></div>`;
            if(!pd.finish) allDone = false;
        });

        if(jeHost && allDone && count > 0) {
            db.ref('rooms/'+mojeMisto+'/status').once('value', s => {
                if(s.val() === 'go') {
                    // ODMĚNA ZA KOLO (15 COINŮ, BEZ ZMĚNY LOGIKY)
                    coins += 15;
                    localStorage.setItem('mm_coins', coins);
                    document.getElementById('coin-val').innerText = coins;
                    
                    if(aktualniLevel < maxLevelu) {
                        setTimeout(() => {
                            let up = {};
                            snap.forEach(p => { up['players/'+p.key+'/finish'] = false; });
                            up['level'] = aktualniLevel + 1;
                            db.ref('rooms/'+mojeMisto).update(up);
                        }, 1500); // Mírně delší čekání pro hezčí přechod
                    } else { db.ref('rooms/'+mojeMisto).update({ status: 'winner' }); }
                }
            });
        }
    });

    db.ref('rooms/'+mojeMisto+'/status').on('value', snap => {
        if(snap.val() === 'go') spustitHru();
        if(snap.val() === 'winner') {
            document.getElementById('game').style.display = 'none';
            document.getElementById('win-screen').style.display = 'flex';
        }
    });
}

function odstartovat() { db.ref('rooms/'+mojeMisto).update({ status: 'go' }); }

function spustitHru() {
    document.getElementById('screen-lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.querySelector('.top-ui').style.display = 'none'; // Schovat Wallet/Shop ve hře
    document.getElementById('max-lvl').innerText = maxLevelu;
    db.ref('rooms/'+mojeMisto+'/level').on('value', snap => { 
        if(snap.val()) { aktualniLevel = snap.val(); resetLevelu(); }
    });
    db.ref('rooms/'+mojeMisto+'/players').on('value', snap => { vykreslitHrace(snap.val()); });
    setInterval(() => { if(!hotov) db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({x:mojePos.x, y:mojePos.y}); }, 50);
}

function resetLevelu() {
    hotov = false;
    document.getElementById('waiting').style.display = "none";
    document.getElementById('lvl').innerText = aktualniLevel;
    const m = mapy[(aktualniLevel - 1) % mapy.length];
    document.getElementById('biom-name').innerText = m.n;
    document.getElementById('game').style.background = m.bg;
    document.getElementById('hud').style.color = m.dark ? "#000" : "#fff";
    
    // Změna barvy HUDu podle biomu
    if(m.neon){ document.getElementById('biom-name').style.color = m.ob; document.getElementById('biom-name').style.shadow = `0 0 15px ${m.ob}`; }
    else { document.getElementById('biom-name').style.color = "#fff"; document.getElementById('biom-name').style.shadow = "none"; }

    const map = document.getElementById('map'); map.innerHTML = "";
    mojePos = { x: 25, y: 25 };

    const size = 40;
    const cols = Math.floor(window.innerWidth / size);
    const rows = Math.floor((window.innerHeight - 160) / size);
    
    let baseObt = 0.14;
    if(obtiznost == "hard") baseObt = 0.19;
    if(obtiznost == "extrem") baseObt = 0.24;
    const obt = baseObt + (aktualniLevel * 0.005);

    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            // BEZPEČNÁ CESTA: Nezakrývat start ani cíl a okolí
            if((r < 3 && c < 3) || (r > rows-4 && c > cols-4)) continue;
            
            if(Math.random() < obt) {
                let o = document.createElement('div');
                o.className = 'obs';
                
                // BARVY ZDÍ: neonové mapy mají barevné svítící zdi, ostatní mají temný okraj
                if(m.ob == "RAINBOW"){ o.style.animation = "rainbowWall 3s linear infinite"; o.style.border = "2px solid #fff"; o.style.boxShadow = "0 0 10px #fff"; }
                else if(m.neon) { o.style.background = "rgba(0,0,0,0.8)"; o.style.border = `2px solid ${m.ob}`; o.style.boxShadow = `0 0 15px ${m.ob}`; }
                else { o.style.background = "rgba(255,255,255,0.05)"; o.style.border = `1px solid rgba(255,255,255,0.1)`; o.style.boxShadow = `0 0 5px rgba(255,255,255,0.05)`; }

                o.style.left = c * size + "px"; o.style.top = r * size + "px";
                map.appendChild(o);
            }
        }
    }
    
    // PŘIDÁNÍ CÍLE (PULSUJÍCÍ NEON)
    let g = document.createElement('div'); 
    g.className = 'goal';
    g.style.left = (cols - 2) * size + "px";
    g.style.top = (rows - 2) * size + "px";
    map.appendChild(g);
}

// Rainbow wall animation
const style = document.createElement('style');
style.textContent = `
    @keyframes rainbowWall { 
        0% { background: #ff0000; border-color: #ffcccc; box-shadow: 0 0 10px #ffcccc; }
        33% { background: #00ff00; border-color: #ccffcc; box-shadow: 0 0 10px #ccffcc; }
        66% { background: #0000ff; border-color: #ccccff; box-shadow: 0 0 10px #ccccff; }
        100% { background: #ff0000; border-color: #ffcccc; box-shadow: 0 0 10px #ffcccc; }
    }
`;
document.head.appendChild(style);


function pohyb(s) {
    if(hotov) return;
    let k = 20, nx = mojePos.x, ny = mojePos.y;
    if(s=='u') ny -= k; if(s=='d') ny += k;
    if(s=='l') nx -= k; if(s=='r') nx += k;
    
    if(nx < 0 || nx > window.innerWidth-28 || ny < 0 || ny > (window.innerHeight-160)-28) return;
    
    let hit = false;
    document.querySelectorAll('.obs').forEach(o => {
        let ox = parseInt(o.style.left), oy = parseInt(o.style.top);
        if(nx < ox+40 && nx+28 > ox && ny < oy+40 && ny+28 > oy) hit = true;
    });

    if(hit) { mojePos = {x:25, y:25}; return; } 

    mojePos.x = nx; mojePos.y = ny;
    const goal = document.querySelector('.goal');
    let gx = parseInt(goal.style.left), gy = parseInt(goal.style.top);
    if(nx < gx+60 && nx+28 > gx && ny < gy+60 && ny+28 > gy) {
        hotov = true;
        document.getElementById('waiting').style.display = "block";
        db.ref('rooms/'+mojeMisto+'/players/'+mujId).update({ finish: true });
    }
}

function vykreslitHrace(hraci) {
    document.querySelectorAll('.player').forEach(p => p.remove());
    for(let id in hraci) {
        let p = hraci[id];
        let d = document.createElement('div');
        d.className = `player skin-${p.skin || 'default'}`;
        d.style.left = p.x + "px"; d.style.top = p.y + "px";
        
        // Pokud je hráč v cíli, zprůhledníme ho (finish check zachován)
        if(p.finish) d.style.opacity = "0.3";
        else {
            // Unikátní neonový obrys hráče podle jeho barvy
            if(p.skin !== 'rainbow'){ d.style.boxShadow = `0 0 20px ${p.color}, 0 0 10px #fff`; d.style.borderColor = "#fff"; }
        }
        
        d.innerHTML = `<div class="p-name">${p.name} ${p.finish?'?':''}</div>`;
        document.getElementById('map').appendChild(d);
    }
}
</script>
