<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAZE MADNESS ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #fe2c55; --accent: #25F4EE; --gold: #FFD700; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* LOBBY FULLSCREEN */
        .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 5000; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); }
        .card { width: 90%; max-width: 450px; background: rgba(20, 20, 30, 0.8); backdrop-filter: blur(15px); padding: 30px; border-radius: 40px; border: 2px solid rgba(255,255,255,0.1); text-align: center; }
        
        h1 { font-family: 'Bungee', cursive; font-size: 2.5rem; color: var(--p); text-shadow: 3px 3px 0px #000, 0 0 20px var(--p); margin: 0; transform: skew(-5deg); }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); background: #000; color: #fff; text-align: center; font-size: 1rem; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-family: 'Bungee'; font-size: 1.1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-main { background: var(--p); color: #fff; box-shadow: 0 5px 0 #b01d3b; }
        .btn-acc { background: var(--accent); color: #000; box-shadow: 0 5px 0 #1abfb9; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* GAME AREA */
        #game { display: none; width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; position: absolute; }

        /* STYLOVÉ KOSTKY (ZDI) */
        .obs { 
            position: absolute; 
            border-radius: 6px; 
            border: 3px solid rgba(0,0,0,0.3); 
            box-shadow: inset 5px 5px 15px rgba(255,255,255,0.1), 5px 5px 10px rgba(0,0,0,0.5);
        }

        /* BIOM DETAILY */
        .ocean-fx { background: url('https://www.transparenttextures.com/patterns/cubes.png'); animation: wave 10s infinite linear; }
        @keyframes wave { from { background-position: 0 0; } to { background-position: 100px 100px; } }

        /* HRÁČI */
        .player { position: absolute; width: 35px; height: 35px; border-radius: 10px; border: 3px solid #fff; z-index: 100; transition: 0.1s linear; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .p-name { position: absolute; top: -28px; font-size: 12px; font-weight: 900; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 5px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.2); }

        /* CÍL */
        .goal { position: absolute; width: 80px; height: 80px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 50px var(--gold); display: flex; align-items: center; justify-content: center; color: #000; font-family: 'Bungee'; animation: pulse 1s infinite alternate; z-index: 50; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.2); opacity: 1; } }

        /* HUD */
        .hud { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 4000; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; border: 2px solid var(--accent); font-family: 'Bungee'; font-size: 1.2rem; }

        /* OVLÁDÁNÍ */
        #controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; z-index: 4500; }
        .c-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 2px solid #fff; border-radius: 25px; color: #fff; font-size: 30px; }
    </style>
</head>
<body>

<div class="hud">
    <div class="stat" style="color: var(--gold);">?? <span id="coins">0</span></div>
    <div id="biom-name" class="stat" style="color: var(--accent);">ČEKÁM...</div>
</div>

<div id="screen-start" class="screen">
    <div class="card">
        <h1>MAZE MADNESS</h1>
        <input id="nick" placeholder="TVOJE PŘEZDÍVKA" maxlength="12">
        <button class="btn btn-main" onclick="start(true)">VYTVOŘIT SERVER (7 MAP)</button>
        <div style="margin: 15px; opacity: 0.3;">——— NEBO ———</div>
        <input id="room-id" placeholder="KÓD SERVERU">
        <button class="btn btn-acc" onclick="start(false)">PŘIPOJIT SE</button>
        <button class="btn" style="background: #222;" onclick="alert('Shop se otevírá...')">SHOP</button>
    </div>
</div>

<div id="game">
    <div id="map"></div>
    <div id="controls">
        <div></div><button class="c-btn" onpointerdown="move('u')">^</button><div></div>
        <button class="c-btn" onpointerdown="move('l')">?</button>
        <button class="c-btn" onpointerdown="move('d')">ˇ</button>
        <button class="c-btn" onpointerdown="move('r')">?</button>
    </div>
</div>

<script>
// --- KONFIGURACE (Použij svůj Firebase) ---
const firebaseConfig = { databaseURL: "https://mejdrixgame-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myId = "u" + Math.floor(Math.random()*9999);
let myPos = { x: 100, y: 100 };
let roomId = "";
let isFinished = false;

// --- 7 BIOMŮ S DETAILY ---
const biomes = [
    { n: "OCEÁN", bg: "#004466", wall: "#0088cc", fx: "ocean-fx" },
    { n: "POUŠŤ", bg: "#edc9af", wall: "#c29a6b", fx: "" },
    { n: "TEMNÝ LES", bg: "#0a2e0a", wall: "#1b4d1b", fx: "" },
    { n: "PEKLO", bg: "#330000", wall: "#ff4400", fx: "" },
    { n: "VESMÍR", bg: "#050505", wall: "#333344", fx: "" },
    { n: "MĚSTO", bg: "#222", wall: "#555", fx: "" },
    { n: "LEDOPÁD", bg: "#e0ffff", wall: "#00ffff", fx: "" }
];

async function start(isHost) {
    let nick = document.getElementById('nick').value || "Hráč";
    roomId = isHost ? Math.floor(1000+Math.random()*8999).toString() : document.getElementById('room-id').value;
    
    if(isHost) {
        await db.ref('rooms/'+roomId).set({
            biom: Math.floor(Math.random()*biomes.length),
            seed: Math.random()
        });
    }

    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('game').style.display = 'block';

    db.ref('rooms/'+roomId+'/players/'+myId).set({ n: nick, x: 100, y: 100 });
    db.ref('rooms/'+roomId+'/players').on('value', drawPlayers);
    db.ref('rooms/'+roomId).once('value', snap => buildMap(snap.val()));
}

function buildMap(data) {
    const biom = biomes[data.biom];
    document.body.style.background = biom.bg;
    document.getElementById('biom-name').innerText = biom.n;
    const m = document.getElementById('map');
    m.className = biom.fx;
    m.innerHTML = "";

    // Generování 3D kostek s obrysem
    for(let i=0; i<40; i++) {
        let b = document.createElement('div');
        b.className = 'obs';
        b.style.width = (50 + Math.random()*150) + "px";
        b.style.height = "40px";
        b.style.left = Math.random()*(window.innerWidth-150) + "px";
        b.style.top = Math.random()*(window.innerHeight-250) + "px";
        b.style.background = biom.wall;
        m.appendChild(b);
    }

    // Cíl
    let g = document.createElement('div');
    g.className = 'goal';
    g.innerHTML = "CÍL";
    g.style.left = (window.innerWidth - 120) + "px";
    g.style.top = (window.innerHeight - 250) + "px";
    m.appendChild(g);
}

function move(dir) {
    if(isFinished) return;
    let step = 20;
    if(dir=='u') myPos.y -= step; if(dir=='d') myPos.y += step;
    if(dir=='l') myPos.x -= step; if(dir=='r') myPos.x += step;

    myPos.x = Math.max(0, Math.min(window.innerWidth-40, myPos.x));
    myPos.y = Math.max(0, Math.min(window.innerHeight-150, myPos.y));

    db.ref('rooms/'+roomId+'/players/'+myId).update({ x: myPos.x, y: myPos.y });

    if(myPos.x > window.innerWidth-150 && myPos.y > window.innerHeight-300) {
        isFinished = true;
        alert("MAPA DOKONČENA!");
        location.reload();
    }
}

function drawPlayers(snap) {
    const players = snap.val();
    document.querySelectorAll('.player').forEach(p => p.remove());
    for(let id in players) {
        let p = players[id];
        let div = document.createElement('div');
        div.className = 'player';
        div.style.left = p.x + "px"; div.style.top = p.y + "px";
        div.style.background = (id === myId) ? 'var(--accent)' : 'var(--p)';
        div.innerHTML = `<div class="p-name">${p.n}</div>??`;
        document.getElementById('map').appendChild(div);
    }
}
</script>
</body>
</html>
